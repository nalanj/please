version: '3'

tasks:
  build:
    desc: Build all commands
    cmds:
      - go build ./...

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf bin/

  install:
    desc: Build and install the please binary
    cmds:
      - go install

  lint:
    desc: Run linters
    cmds:
      - golangci-lint run

  test:
    desc: Run tests
    cmds:
      - go test ./...

  run:
    desc: Run please CLI
    cmds:
      - go run ./cmd/please

  ui:
    desc: Run UI demo
    cmds:
      - go run ./cmd/ui {{.CLI_ARGS}}
